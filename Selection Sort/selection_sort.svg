<line id='divider' stroke='black'/>

<path id='arrow' opacity='1' d='M-5 50 h10 v-30 h10 l-15 -10 l-15 10 h10 v30 Z' fill='red' stroke='black'></path> <!-- centre is defined as the 10 px above the point -->

<g id='rects'/>

