<svg id='svg_elem' xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" transform="translate(20,20)" style="margin: auto">

<defs>
  <style type="text/css">
  <![CDATA[
    text.center { text-anchor:middle; }
  ]]>
  </style>
</defs>
<title>Selection sort</title>

<rect id='border' x='0' y='0' stroke='black' fill='white'/>
